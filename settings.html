<div class="stsb-syncer-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b><i class="fa-solid fa-arrows-rotate"></i> ST ↔ SB Syncer</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="stsb-engine-status">
                <span class="stsb-status-dot" id="stsb-status-dot"></span>
                <small id="stsb-engine-msg">Checking sync app...</small>
                <button id="stsb-refresh" class="menu_button" title="Recheck connection"><i class="fa-solid fa-rotate"></i></button>
            </div>

            <div class="stsb-start-hint" id="stsb-start-hint" style="display:none;">
                <div class="stsb-start-row">
                    <input id="stsb-repo-path" type="text" class="text_pole" placeholder="ST-SB-Syncer repo path" spellcheck="false">
                    <button id="stsb-copy-cmd" class="menu_button" title="Copy start command to clipboard"><i class="fa-solid fa-copy"></i> Copy</button>
                </div>
                <small>Paste the command into a terminal to start the sync app, then click <i class="fa-solid fa-rotate"></i> to reconnect.</small>
            </div>

            <div class="stsb-syncer-path-group">
                <label for="stsb_st_path"><strong>SillyTavern Path</strong></label>
                <input id="stsb_st_path" type="text" class="text_pole" placeholder="/path/to/SillyTavern" spellcheck="false">
            </div>
            <div class="stsb-syncer-path-group">
                <label for="stsb_sb_path"><strong>SillyBunny Path</strong></label>
                <input id="stsb_sb_path" type="text" class="text_pole" placeholder="/path/to/SillyBunny" spellcheck="false">
            </div>

            <div class="stsb-sync-section">
                <div class="stsb-sync-section-title">Profile &amp; Chat Data</div>
                <div class="stsb-sync-buttons">
                    <button class="stsb-btn stsb-btn-st" id="stsb-sync-st-to-sb">ST → SillyBunny</button>
                    <button class="stsb-btn stsb-btn-sb" id="stsb-sync-sb-to-st">SillyBunny → ST</button>
                </div>
            </div>

            <div class="stsb-sync-section">
                <div class="stsb-sync-section-title">Third-Party Extensions</div>
                <div class="stsb-sync-buttons">
                    <button class="stsb-btn stsb-btn-ext-st" id="stsb-ext-st-to-sb">Ext ST → SB</button>
                    <button class="stsb-btn stsb-btn-ext-sb" id="stsb-ext-sb-to-st">Ext SB → ST</button>
                </div>
            </div>

            <div class="stsb-log-area" id="stsb-log">
                <span class="stsb-log-placeholder">Ready. Enter paths and click a sync button.</span>
            </div>
        </div>
    </div>
</div>
